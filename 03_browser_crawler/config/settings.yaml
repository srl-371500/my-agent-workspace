# Browser Distillation Service Configuration
# Please fill in your API keys and endpoints below

# API Configuration
api:
  # OpenAI-compatible API endpoint (MiMo-V2.5 SGP Node)
  endpoint: "https://token-plan-sgp.xiaomimimo.com/v1"
  # API Key (user configured)
  api_key: " tp-sfi4vkadiagpdl9gj4wianovquw2xwsc0bs6l93dfu0agft5"
  # Model name (mimo-v2.5 with native multimodal vision capabilities)
  model: "mimo-v2.5"

# Browser Configuration
browser:
  # Browser type (chromium, firefox, webkit)
  type: "chromium"
  # Headless mode
  headless: true
  # Viewport size
  viewport:
    width: 1920
    height: 1080

# Logging Configuration
logging:
  # Log level (DEBUG, INFO, WARNING, ERROR)
  level: "INFO"
  # Log file path
  file: "logs/browser_distillation.log"

# Proxy Configuration (optional)
proxy:
  # Enable proxy
  enabled: false
  # Proxy server URL
  server: ""
  # Proxy username (if required)
  username: ""
  # Proxy password (if required)
  password: ""

# Retry Configuration
retry:
  # Maximum retry attempts
  max_attempts: 3
  # Delay between retries (seconds)
  delay: 1

# Timeout Configuration
timeout:
  # Page load timeout (milliseconds)
  page_load: 30000
  # Script timeout (milliseconds)
  script: 10000
  # Navigation timeout (milliseconds)
  navigation: 30000